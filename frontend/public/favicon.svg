<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bgGradient" cx="35%" cy="35%" r="100%">
      <stop offset="0%" style="stop-color:#e03030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9a0a0a;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- 外環圈 -->
  <circle cx="50" cy="50" r="48" fill="#6b0000" />
  
  <!-- 棋子主體 -->
  <circle cx="50" cy="50" r="42" fill="url(#bgGradient)" stroke="#facc15" stroke-width="3" filter="url(#shadow)" />
  
  <!-- 內部裝飾環 -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
  
  <!-- 字體："帥" -->
  <text x="50" y="62" font-family="'Noto Serif TC', serif" font-weight="bold" font-size="42" text-anchor="middle" fill="#fff8e1" style="text-shadow: 0 2px 4px rgba(0,0,0,0.5)">帥</text>
</svg>
